<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maison Elara — Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream: #f7f3ee;
      --warm-white: #faf8f5;
      --gold: #b8965a;
      --gold-light: #d4b07a;
      --gold-dark: #8a6a38;
      --charcoal: #1a1714;
      --mid: #5c5449;
      --soft: #9e9189;
      --border: rgba(184, 150, 90, 0.25);
      --shadow: rgba(26, 23, 20, 0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--cream);
      color: var(--charcoal);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 72px 40px 48px;
      position: relative;
    }

    .header-rule {
      display: flex;
      align-items: center;
      gap: 20px;
      justify-content: center;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 1s ease 0.1s forwards;
    }

    .header-rule span {
      display: block;
      height: 1px;
      width: 80px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }

    .header-rule span:last-child {
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .header-rule svg {
      width: 18px;
      height: 18px;
      fill: var(--gold);
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      animation: fadeUp 1s ease 0.2s forwards;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(42px, 6vw, 76px);
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: var(--charcoal);
      margin: 14px 0 10px;
      opacity: 0;
      animation: fadeUp 1s ease 0.35s forwards;
    }

    h1 em {
      font-style: italic;
      color: var(--gold-dark);
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--soft);
      opacity: 0;
      animation: fadeUp 1s ease 0.5s forwards;
    }

    /* ── GRID ── */
    .collection {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 40px 80px;
      position: relative;
      z-index: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 32px;
    }

    /* ── CARD ── */
    .card {
      background: var(--warm-white);
      border: 1px solid var(--border);
      position: relative;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  box-shadow 0.4s ease;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .card:nth-child(1) { animation-delay: 0.55s; }
    .card:nth-child(2) { animation-delay: 0.7s; }
    .card:nth-child(3) { animation-delay: 0.85s; }
    .card:nth-child(4) { animation-delay: 1.0s; }
    .card:nth-child(5) { animation-delay: 1.15s; }
    .card:nth-child(6) { animation-delay: 1.3s; }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid transparent;
      transition: border-color 0.4s ease;
      pointer-events: none;
      z-index: 1;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 60px var(--shadow), 0 4px 12px rgba(184,150,90,0.08);
    }

    .card:hover::before {
      border-color: var(--gold);
    }

    /* Corner accents */
    .card::after {
      content: '';
      position: absolute;
      top: 8px; left: 8px; right: 8px; bottom: 8px;
      border: 1px solid transparent;
      transition: border-color 0.5s ease 0.05s;
      pointer-events: none;
      z-index: 1;
    }

    .card:hover::after {
      border-color: rgba(184,150,90,0.15);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      position: relative;
      background: #ede8e0;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.5s ease;
      filter: sepia(8%) brightness(0.97);
    }

    .card:hover .card-image img {
      transform: scale(1.06);
      filter: sepia(0%) brightness(1);
    }

    /* Tag */
    .tag {
      position: absolute;
      top: 16px; left: 16px;
      background: var(--charcoal);
      color: var(--gold-light);
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 5px 12px;
      z-index: 2;
      opacity: 0;
      transform: translateX(-8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .card:hover .tag { opacity: 1; transform: translateX(0); }

    .card-body {
      padding: 24px 24px 28px;
      border-top: 1px solid var(--border);
    }

    .card-category {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 22px;
      line-height: 1.25;
      color: var(--charcoal);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }

    .card-desc {
      font-size: 10.5px;
      letter-spacing: 0.05em;
      color: var(--soft);
      line-height: 1.65;
      margin-bottom: 20px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      color: var(--charcoal);
      letter-spacing: 0.02em;
    }

    .price sup {
      font-size: 13px;
      vertical-align: super;
      color: var(--gold-dark);
    }

    .btn {
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--charcoal);
      border: 1px solid var(--charcoal);
      padding: 9px 18px;
      background: transparent;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color 0.35s ease, border-color 0.35s ease;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--charcoal);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      z-index: 0;
    }

    .btn:hover::before { transform: scaleX(1); }
    .btn:hover { color: var(--gold-light); border-color: var(--charcoal); }
    .btn span { position: relative; z-index: 1; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 40px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--soft);
    }

    /* ── ANIMATION ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="header-rule">
    <span></span>
    <svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>
    <span></span>
  </div>
  <p class="eyebrow">Curated Collection — 2026</p>
  <h1>The Art of<br><em>Refined Bags</em></h1>
  <p class="subtitle">Timeless pieces, crafted with intention</p>
</header>

<main class="collection">
  <div class="grid" id="product-grid"></div>
</main>

<footer>
  <p>Éternelle Luxe &nbsp;·&nbsp; Est. 2026 &nbsp;·&nbsp; All rights reserved</p>
</footer>

<script>
  const products = [
    {
      name: "Mini Lady Dior",
      category: "Bags",
      desc: "Mini Lady Dior, second hand",
      price: "2500",
      tag: "Bestseller",
      img: "https://api.platforme.com/api/compose?brand=dior&model=my_lady_dior_cuir&version=913&p=base:cuir:noir_em900&initials=&format=webp"
    },
    {
      name: "Classic 11.12 Chanel",
      category: "Bags",
      desc: "Classic 11.12 Chanel, second hand",
      price: "2400",
      tag: "New Arrival",
      img: "https://www.chanel.com/images///t_fashioncommercial_trim,f_auto,q_auto:good,dpr_1.1/w_3200/-9553977114654.jpg%203200w"
    },
    {
      name: "YSL Shoulder Bag",
      category: "Bags",
      desc: "YSL Shoulder Bag, second hand",
      price: "1800",
      tag: "Limited",
      img: "https://www.mytheresa.com/image/1094/1238/100/a5/P00979452.jpg"
    },
    {
      name: "Prada Leather Bag",
      category: "Bags",
      desc: "Prada Leather Bag, second hand",
      price: "2000",
      tag: "Editor's Pick",
      img: "https://www.prada.com/content/dam/pradabkg_products/1/1BC/1BC229/2CYSF0PG7/1BC229_2CYS_F0PG7_V_LVM_SLF.jpg"
    },
    {
      name: "Miu Miu Metallis Mini",
      category: "Bags",
      desc: "Miu Miu Metallis Mini, second hand",
      price: "1900",
      tag: "Handcrafted",
      img: "https://cdn.salla.sa/RvPxw/f5227c4b-6b58-431e-967a-3cb571d1d8d7-1000x1000-ullmj40HE6RO7TQrY5xyoS02tLOj7fogMCsVLOcS.png"
    },
    {
      name: "Louis Vuitton Alma Bag",
      category: "Bags",
      desc: "Louis Vuitton Alma Bag, second hand",
      price: "2400",
      tag: "Artisan",
      img: "https://kr.louisvuitton.com/images/is/image/lv/1/PP_VP_L/louis-vuitton-alma-bb--M46990_PM2_Front%20view.png?wid=1300&hei=1300"
    }
  ];

  const grid = document.getElementById('product-grid');

  products.forEach(p => {
    grid.innerHTML += `
      <article class="card">
        <div class="card-image">
          <img src="${p.img}" alt="${p.name}" loading="lazy"/>
          <div class="tag">${p.tag}</div>
        </div>
        <div class="card-body">
          <p class="card-category">${p.category}</p>
          <h2 class="card-name">${p.name}</h2>
          <p class="card-desc">${p.desc}</p>
          <div class="card-footer">
            <div class="price"><sup>$</sup>${p.price}</div>
            <button class="btn"><span>Add to Cart</span></button>
          </div>
        </div>
      </article>
    `;
  });
</script>
</body>
</html>
